{% extends "base.html" %}

{% block title %}Tags - gertjanassies.dev{% endblock title %}

{% block content %}
<div class="blog-page">
  <div class="page-view-container">
    <h1>Tags</h1>
    <div class="taxonomy-list">
      {% for term in terms %}
        <a href="{{ term.permalink }}" class="tag taxonomy-term">
          {{ term.name }} <span class="taxonomy-count">({{ term.pages | length }})</span>
        </a>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock content %}
